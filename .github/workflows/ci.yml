name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Validate, build, tests, manifest digests
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: npm test

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: mbstring

      - name: Composer install and PHPUnit
        run: composer install --no-interaction --prefer-dist && composer test
